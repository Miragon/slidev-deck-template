name: Release

# On every push to main, release-please maintains a "Release PR" that bumps the
# @miragon/slidev-toolkit version and updates CHANGELOG.md. Merging that Release
# PR creates the GitHub release/tag and triggers the npm publish job.
#
# The GitHub App token (not the default GITHUB_TOKEN) is required so the bot's
# commits/tags trigger downstream workflows — a plain GITHUB_TOKEN would not.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Validate packaging/publish without releasing'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    # Skip cleanly until the GitHub App is configured (Teil 3 of the setup), so a
    # push to main does not fail the workflow before the credentials exist.
    if: >-
      (github.event_name != 'workflow_dispatch' || !inputs.dry_run) &&
      vars.RELEASE_PLEASE_APP_CLIENT_ID != ''
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release_please.outputs.releases_created }}
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_PLEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
      - id: release_please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-npm:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-npm-package.yml

  # Manual sanity check: `Run workflow` with dry_run = true builds and runs
  # `npm publish --dry-run` without releasing or publishing anything.
  dry-run:
    if: github.event_name == 'workflow_dispatch' && inputs.dry_run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm publish -w packages/toolkit --access public --dry-run
