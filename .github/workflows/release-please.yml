name: Release

# On every push to main, release-please maintains a "Release PR" that bumps the
# @miragon/slidev-toolkit version and updates CHANGELOG.md. Merging that Release
# PR creates the GitHub release/tag and triggers the npm publish job.
#
# The GitHub App token (not the default GITHUB_TOKEN) is required so the bot's
# commits/tags trigger downstream workflows — a plain GITHUB_TOKEN would not.
#
# TEMPLATE-ONLY: this repo is a GitHub template, so "Use this template" copies
# this workflow into every new deck repo. The App credentials live at ORG level
# in Miragon, so a copy would happily open Release PRs there and then fail the
# npm publish (the OIDC repo claim no longer matches the trusted publisher).
# Every job is therefore guarded by `github.repository == '<this repo>'`; in a
# derived repo the run shows up as skipped and does nothing. The guard is a
# literal string per job on purpose — the `env` context is not available in
# `jobs.<id>.if`. If this repo is ever renamed or moved, update all three.
#
# npm publish uses Trusted Publishing (OIDC). npm's registry validates the OIDC
# token against the trusted-publisher config on npmjs.com, and EVERY claim must
# match or the token exchange fails with a misleading `E404` ("package not
# found") — see npm/cli#8678, #9088. Two things the config must agree with:
#   1. Workflow filename = release-please.yml. The publish therefore runs INLINE
#      here (NOT a reusable workflow), so the OIDC workflow ref resolves to this
#      file and not to a callee.
#   2. NO GitHub environment. The trusted-publisher "Environment name" field is
#      empty, so this job must NOT declare `environment:` — an environment claim
#      the config doesn't expect makes the exchange 404. Keep them in sync: to
#      re-add an environment, set the same name in the npm config first.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Validate packaging/publish without releasing'
        type: boolean
        default: false
      publish_current:
        description: 'Publish the current packages/toolkit version now (idempotent recovery lever)'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    # Skip cleanly until the GitHub App is configured (Teil 3 of the setup), so a
    # push to main does not fail the workflow before the credentials exist.
    if: >-
      github.repository == 'Miragon/slidev-deck-template' &&
      (github.event_name != 'workflow_dispatch' || !inputs.dry_run) &&
      vars.RELEASE_PLEASE_APP_CLIENT_ID != ''
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release_please.outputs.releases_created }}
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_PLEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
      - id: release_please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Inline publish (see the note at the top of this file — must NOT be a reusable
  # workflow, so the OIDC token resolves to release-please.yml for npm Trusted
  # Publishing). Runs when release-please cut a release, OR on a manual
  # `publish_current` dispatch (recovery / republish). Idempotent: skips if the
  # current version is already on the registry.
  publish-npm:
    needs: release-please
    if: >-
      github.repository == 'Miragon/slidev-deck-template' &&
      !cancelled() && needs.release-please.result != 'failure' &&
      (needs.release-please.outputs.releases_created == 'true' ||
       (github.event_name == 'workflow_dispatch' && inputs.publish_current))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      # Trusted Publishing (OIDC) needs npm >= 11.5.1, newer than what Node 24
      # ships. Upgrade the CLI before publishing.
      - run: npm install -g npm@latest
      - run: npm ci
      - name: Publish @miragon/slidev-toolkit
        run: |
          name="$(node -p "require('./packages/toolkit/package.json').name")"
          version="$(node -p "require('./packages/toolkit/package.json').version")"
          if npm view "$name@$version" version > /dev/null 2>&1; then
            echo "$name@$version already published — skipping"
          else
            npm publish -w packages/toolkit --provenance --access public
          fi

  # Manual sanity check: `Run workflow` with dry_run = true builds and runs
  # `npm publish --dry-run` without releasing or publishing anything.
  dry-run:
    if: >-
      github.repository == 'Miragon/slidev-deck-template' &&
      github.event_name == 'workflow_dispatch' && inputs.dry_run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm publish -w packages/toolkit --access public --dry-run
