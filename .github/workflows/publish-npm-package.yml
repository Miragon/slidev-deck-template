name: Publish npm package

# Reusable publish job for @miragon/slidev-toolkit. Uses npm Trusted Publishing
# (OIDC) — no long-lived npm token. It needs `id-token: write` and the workflow
# must be registered as a trusted publisher for the package on npmjs.com.
# Idempotent: skips if the current version is already on the registry.
on:
  workflow_call:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      # Trusted Publishing (OIDC) needs npm >= 11.5.1, newer than what Node 24
      # ships. Upgrade the CLI before publishing.
      - run: npm install -g npm@latest
      - run: npm ci
      - name: Publish @miragon/slidev-toolkit
        run: |
          name="$(node -p "require('./packages/toolkit/package.json').name")"
          version="$(node -p "require('./packages/toolkit/package.json').version")"
          if npm view "$name@$version" version > /dev/null 2>&1; then
            echo "$name@$version already published — skipping"
          else
            npm publish -w packages/toolkit --provenance --access public
          fi
