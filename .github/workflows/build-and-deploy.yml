name: Build Deck

# Build on every push to main AND on every pull request — so Dependabot
# (and human) PRs get a green/red CI status before merge.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege at workflow level.
permissions:
  contents: read

jobs:
  build:
    concurrency:
      group: build-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # No browser step: the deck keeps the PDF export (`download: true`) switched
      # off on purpose, so `slidev build` is pure static output. Export the PDF
      # locally with `npm run export`. The verify step below is source-only and
      # needs no browser either.
      - name: Build HTML
        run: npx slidev build deck/slides.md --base /${{ github.event.repository.name }}/ --out ../dist

      # Fitness functions: fast source-level guardrails (every slide declares a
      # sanctioned layout archetype, no HTML entities, diagrams light/transparent).
      # No dev server/browser needed; runs on PRs too, so forks inherit it. Placed
      # after the build so dist/ exists for the transparent-diagram check.
      - name: Verify guardrails (layout + source checks)
        run: npm run verify:source
