name: Build & Deploy Deck

# Build on every push to main AND on every pull request — so Dependabot
# (and human) PRs get a green/red CI status before merge. Deploy is gated
# to pushes on main only.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege at workflow level. The deploy job opts into the extra
# permissions it actually needs.
permissions:
  contents: read

# Concurrency is per-job, not workflow-level:
#   build  → cancel-in-progress: true   (newer commit makes the older build
#                                        irrelevant; cancel to save minutes)
#   deploy → cancel-in-progress: false  (deploys are atomic; cancelling
#                                        mid-flight can leave Pages in a
#                                        half-updated state)
jobs:
  build:
    concurrency:
      group: build-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Chromium nur hier in der CI installiert; der Build erzeugt damit
      # das PDF (slidev-exported.pdf) für den Download-Button (download: true).
      - name: Install Chromium for PDF export
        run: npx playwright install chromium --with-deps

      - name: Build HTML (incl. PDF for download button)
        run: npx slidev build deck/slides.md --base /${{ github.event.repository.name }}/ --out ../dist

      # Fitness functions: fast source-level guardrails (every slide declares a
      # sanctioned layout archetype, no HTML entities, diagrams light/transparent).
      # No dev server/browser needed; runs on PRs too, so forks inherit it. Placed
      # after the build so dist/ exists for the transparent-diagram check.
      - name: Verify guardrails (layout + source checks)
        run: npm run verify:source

      # Pages-Artefakt nur auf main-Pushes hochladen — PRs brauchen den
      # Build-Check, aber keinen Deploy-Artifact-Upload.
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Deploys run to completion. Multiple deploys to main queue up rather
    # than cancelling, so Pages can never be left in a half-deployed state.
    concurrency:
      group: pages-${{ github.ref }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
