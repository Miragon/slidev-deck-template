# Netlify build for the Slidev deck.
#
# This file does NOTHING on its own. Netlify never creates a site for a repo by
# itself — it builds only what someone deliberately links to a site in the
# Netlify UI. A repo created via "Use this template" therefore inherits this
# config but no site, no deploys and no URL. It is here so that connecting the
# repo later is a one-click affair: the build is already configured correctly.
#
# `npm run build` is a plain `slidev build` — no browser involved. The deck
# keeps the PDF export (`download: true`) switched off on purpose (see the note
# in deck/slides.md), so the Chromium install this command used to carry was
# pure build time. Export the PDF locally with `npm run export` instead.
[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback so deep links (e.g. /23) resolve on a hard refresh. Netlify
# serves existing static assets first and only falls back to index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
